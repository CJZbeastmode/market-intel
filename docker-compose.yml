services:
  crond-1:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8001"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "0"
      API_ADDR: ":8080"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: ""
    volumes:
      - raft-data-1:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  crond-2:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8002"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "1"
      API_ADDR: ":8081"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: ""
    volumes:
      - raft-data-2:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8081:8081"
    restart: unless-stopped

  crond-3:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8003"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "2"
      API_ADDR: ":8082"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: ""
    volumes:
      - raft-data-3:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  raft-data-1:
  raft-data-2:
  raft-data-3:
