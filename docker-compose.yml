services:
  crond-1:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8001"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "0"
      API_ADDR: ":8080"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: "redpanda:9092"
    volumes:
      - raft-data-1:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  crond-2:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8002"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "1"
      API_ADDR: ":8081"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: "redpanda:9092"
    volumes:
      - raft-data-2:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8081:8081"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  crond-3:
    build:
      context: .
      dockerfile: Dockerfile.crond
    environment:
      BIND_ADDR: ":8003"
      PEERS: "crond-1:8001,crond-2:8002,crond-3:8003"
      ME: "2"
      API_ADDR: ":8082"
      RAFT_DATA_DIR: "/data"
      KAFKA_BROKERS: "redpanda:9092"
    volumes:
      - raft-data-3:/data
      - ./config.yaml:/config.yaml:ro
    ports:
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: marketintel
      POSTGRES_USER: marketintel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marketintel_dev}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./deployment/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketintel -d marketintel"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    environment:
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: marketintel
      DB_USER: marketintel
      DB_PASSWORD: ${DB_PASSWORD:-marketintel_dev}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:9092
      ML_JOBS_TOPIC: jobs.ml
      ML_WORKER_GROUP: market-intel-ml-worker
      TICKERS: ${TICKERS:-AAPL}
      DEMO_MODE: ${DEMO_MODE:-false}
    volumes:
      - ./ml:/app/ml
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped

volumes:
  raft-data-1:
  raft-data-2:
  raft-data-3:
  timescale-data:
  redis-data:
  redpanda-data:
